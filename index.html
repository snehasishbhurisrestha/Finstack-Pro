<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>💖 For My Love | Puzzle Surprise</title>
  <!-- canvas-confetti library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 20%, #ffe6f0 0%, #fad0e6 40%, #fbc2d4 80%);
      background-attachment: fixed;
      font-family: 'Segoe UI', 'Cormorant Garamond', 'Georgia', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* floating romantic elements */
    body::before {
      content: "❤️";
      position: absolute;
      font-size: 120px;
      opacity: 0.08;
      top: 10px;
      left: 20px;
      transform: rotate(-15deg);
      pointer-events: none;
    }

    body::after {
      content: "💕";
      position: absolute;
      font-size: 150px;
      opacity: 0.06;
      bottom: 20px;
      right: 30px;
      transform: rotate(10deg);
      pointer-events: none;
    }

    .heart-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .heart-bg span {
      position: absolute;
      color: rgba(220, 70, 110, 0.12);
      font-size: 3rem;
      user-select: none;
    }

    /* main card container */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 750px;
      background: rgba(255, 245, 250, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 48px;
      padding: 30px 28px 40px;
      box-shadow: 0 25px 40px -8px rgba(160, 40, 80, 0.25),
                  0 0 0 1.5px rgba(255, 220, 230, 0.6) inset,
                  0 8px 20px rgba(210, 70, 100, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.6);
      transition: all 0.3s ease;
    }

    /* quote page */
    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease, transform 0.4s ease;
    }

    .hidden-page {
      display: none !important;
    }

    .quote-wrapper {
      text-align: center;
      padding: 20px 10px;
    }

    .romantic-quote {
      font-size: 2.4rem;
      font-weight: 500;
      line-height: 1.4;
      color: #5a1e3c;
      text-shadow: 0 4px 12px rgba(250, 180, 200, 0.7);
      font-family: 'Cormorant Garamond', 'Times New Roman', serif;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .quote-author {
      font-size: 1.4rem;
      color: #a13e62;
      font-style: italic;
      margin-top: 8px;
      opacity: 0.9;
    }

    .quote-decoration {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin: 18px 0 10px;
      font-size: 28px;
      color: #d45e7a;
    }

    /* romantic button */
    .btn-romantic {
      background: linear-gradient(145deg, #ffa7c4, #f07a9b);
      border: none;
      border-radius: 60px;
      padding: 18px 44px;
      font-size: 1.8rem;
      font-weight: 600;
      color: #3f1425;
      box-shadow: 0 14px 20px -6px #e6739a, 0 2px 0 0 #ffe5ed inset, 0 -2px 4px #b34e6e inset;
      cursor: pointer;
      border: 1.5px solid #fff2f7;
      font-family: 'Segoe UI', serif;
      letter-spacing: 1px;
      transition: all 0.25s;
      margin: 24px 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(5px);
      transform: scale(1);
    }

    .btn-romantic:hover {
      transform: scale(1.02);
      background: linear-gradient(145deg, #ffb7d1, #fc8aad);
      box-shadow: 0 18px 24px -8px #d45a7e, 0 2px 0 0 #fff0f5 inset;
      color: #2e0e1b;
    }

    .btn-romantic:active {
      transform: scale(0.98);
      box-shadow: 0 6px 12px -2px #c95f7c, 0 1px 0 #fff inset;
    }

    /* puzzle page */
    .puzzle-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .puzzle-title {
      font-size: 1.9rem;
      color: #691c38;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
      text-shadow: 0 2px 5px #fbb6cf;
    }

    .back-btn {
      background: rgba(255, 240, 245, 0.9);
      border: 1.5px solid #ffb0c3;
      border-radius: 40px;
      padding: 8px 20px;
      font-size: 1.1rem;
      color: #731d42;
      font-weight: 600;
      backdrop-filter: blur(4px);
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(200, 80, 110, 0.2);
      transition: 0.2s;
    }

    .back-btn:hover {
      background: #ffe3ec;
      border-color: #e6739a;
    }

    /* puzzle grid — elegant swappable tiles */
    .puzzle-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      background: rgba(255, 230, 240, 0.5);
      padding: 18px 18px;
      border-radius: 40px;
      backdrop-filter: blur(5px);
      box-shadow: 0 10px 20px rgba(150, 40, 70, 0.15), inset 0 1px 4px #ffeef4;
      margin-bottom: 24px;
      border: 1px solid #ffd9e4;
    }

    .puzzle-tile {
      aspect-ratio: 1 / 1;
      background-size: 300% 300%;
      background-repeat: no-repeat;
      border-radius: 22px;
      box-shadow: 0 8px 0 #b34b67, 0 6px 12px rgba(140, 30, 60, 0.2), inset 0 2px 6px white;
      cursor: pointer;
      transition: all 0.12s ease;
      border: 3px solid #ffe9f1;
      image-rendering: crisp-edges;
    }

    .puzzle-tile.selected {
      box-shadow: 0 0 0 6px #ffe5b4, 0 8px 0 #b34b67, 0 8px 15px #b3476b;
      transform: scale(1.02);
      border: 3px solid #fff0e0;
    }

    .puzzle-tile:active {
      transform: scale(0.97);
      box-shadow: 0 4px 0 #9e3f5a, 0 5px 10px #ac4666;
    }

    /* status and win message */
    .puzzle-status {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 500;
      color: #791e46;
      margin: 5px 0 15px;
      min-height: 3.2rem;
      letter-spacing: 0.3px;
    }

    .win-message {
      background: rgba(255, 225, 235, 0.8);
      padding: 10px 22px;
      border-radius: 60px;
      backdrop-filter: blur(6px);
      font-size: 1.7rem;
      display: inline-block;
      border: 1px solid #ffbfd2;
      color: #a5214f;
      font-weight: bold;
    }

    .shuffle-btn {
      background: #f5cedb;
      border: none;
      border-radius: 40px;
      padding: 12px 24px;
      font-size: 1.2rem;
      color: #591c34;
      font-weight: 600;
      box-shadow: 0 4px 0 #af4a6b, 0 6px 10px #d67a96;
      border: 1px solid #ffeef2;
      cursor: pointer;
      transition: 0.1s;
      margin-right: 12px;
    }

    .shuffle-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #9e3f5a, 0 5px 8px #bc6b84;
    }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
    }

    /* footer hearts */
    .footer-note {
      margin-top: 30px;
      text-align: center;
      font-size: 1.2rem;
      color: #9e365a;
      opacity: 0.9;
    }

    /* responsive */
    @media (max-width: 500px) {
      .container { padding: 20px 16px 30px; }
      .romantic-quote { font-size: 1.9rem; }
      .btn-romantic { font-size: 1.5rem; padding: 14px 28px; }
      .puzzle-title { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="heart-bg" id="heartBg"></div>

<div class="container">
  <!-- PAGE 1: QUOTE + BUTTON -->
  <div id="quotePage" class="page">
    <div class="quote-wrapper">
      <div class="quote-decoration">
        <span>✨</span><span>🌹</span><span>💫</span>
      </div>
      <div class="romantic-quote">
        "In a sea of people,<br>my eyes will always search for you."
      </div>
      <div class="quote-author">— for my favorite person</div>
      <div class="quote-decoration">
        <span>💖</span><span>🕊️</span><span>💞</span>
      </div>
    </div>
    <button class="btn-romantic" id="startPuzzleBtn">
      <span>🧩</span> Unlock our puzzle <span>💝</span>
    </button>
    <div class="footer-note">
      <span>made with all my heart</span>
    </div>
  </div>

  <!-- PAGE 2: PUZZLE (HIDDEN INITIALLY) -->
  <div id="puzzlePage" class="page hidden-page">
    <div class="puzzle-header">
      <div class="puzzle-title">
        <span>🧸</span> piece by piece <span>🌸</span>
      </div>
      <button class="back-btn" id="backToQuoteBtn">← back</button>
    </div>

    <!-- Hidden image for preloading -->
    <img id="puzzleSourceImage" src="https://images.pexels.com/photos/1028726/pexels-photo-1028726.jpeg?auto=compress&cs=tinysrgb&w=600" alt="romantic" style="display: none;" crossorigin="anonymous">

    <!-- 3x3 puzzle grid -->
    <div class="puzzle-grid" id="puzzleGrid"></div>

    <div class="puzzle-status" id="puzzleStatus">
      <span id="statusText">swap tiles · make us whole</span>
    </div>

    <div class="actions">
      <button class="shuffle-btn" id="shuffleBtn">🔄 Shuffle</button>
    </div>
    <div class="footer-note" style="margin-top: 24px;">
      <span>💌 solve the puzzle · confetti awaits</span>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ----- ROMANTIC BACKGROUND FLOATING HEARTS -----
    const heartBg = document.getElementById('heartBg');
    const heartIcons = ['❤️','💗','💖','💘','💕','💓','💞','🌸','✨','🕊️'];
    for (let i=0; i<18; i++) {
      const span = document.createElement('span');
      span.textContent = heartIcons[Math.floor(Math.random() * heartIcons.length)];
      span.style.left = Math.random() * 100 + '%';
      span.style.top = Math.random() * 100 + '%';
      span.style.fontSize = (20 + Math.floor(Math.random() * 50)) + 'px';
      span.style.opacity = 0.1 + Math.random() * 0.2;
      span.style.transform = `rotate(${Math.random()*30 - 15}deg)`;
      heartBg.appendChild(span);
    }

    // ----- DOM ELEMENTS -----
    const quotePage = document.getElementById('quotePage');
    const puzzlePage = document.getElementById('puzzlePage');
    const startBtn = document.getElementById('startPuzzleBtn');
    const backBtn = document.getElementById('backToQuoteBtn');
    const puzzleGrid = document.getElementById('puzzleGrid');
    const statusText = document.getElementById('statusText');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const sourceImage = document.getElementById('puzzleSourceImage');

    // ----- PUZZLE CONFIG -----
    const SIZE = 3;
    const TILE_COUNT = SIZE * SIZE;
    
    // Use a beautiful, reliable romantic couple image from Pexels (free to use)
    // This is a romantic couple silhouette/heart image that will definitely load
    const PUZZLE_IMAGE = 'https://images.pexels.com/photos/1028726/pexels-photo-1028726.jpeg?auto=compress&cs=tinysrgb&w=600';
    
    // Alternative backup image in case the first one fails
    const BACKUP_IMAGE = 'https://images.pexels.com/photos/931177/pexels-photo-931177.jpeg?auto=compress&cs=tinysrgb&w=600';
    
    let currentImage = PUZZLE_IMAGE;
    
    // puzzle state
    let tiles = [];
    let selectedIndex = null;
    let gameWon = false;
    let confettiFired = false;
    let imageLoaded = false;

    // ----- IMAGE LOADING -----
    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          imageLoaded = true;
          resolve(img);
        };
        img.onerror = () => {
          // Try backup image
          if (src === PUZZLE_IMAGE) {
            console.log('Primary image failed, trying backup...');
            currentImage = BACKUP_IMAGE;
            const backupImg = new Image();
            backupImg.crossOrigin = 'anonymous';
            backupImg.onload = () => {
              imageLoaded = true;
              resolve(backupImg);
            };
            backupImg.onerror = reject;
            backupImg.src = BACKUP_IMAGE;
          } else {
            reject(new Error('Both images failed to load'));
          }
        };
        img.src = src;
      });
    }

    // ----- UTILS -----
    function isSolved() {
      for (let i = 0; i < TILE_COUNT; i++) {
        if (tiles[i] !== i) return false;
      }
      return true;
    }

    function checkWin() {
      if (!gameWon && isSolved()) {
        gameWon = true;
        statusText.innerHTML = '🎉✨ You solved it! I love you! ✨🎉';
        statusText.classList.add('win-message');
        fireConfetti();
        confettiFired = true;
      } else if (!isSolved()) {
        gameWon = false;
        statusText.classList.remove('win-message');
        statusText.innerHTML = '💞 swap pieces · piece our love together 💞';
        confettiFired = false;
      } else {
        statusText.innerHTML = '🎉✨ You solved it! I love you! ✨🎉';
        statusText.classList.add('win-message');
      }
    }

    function fireConfetti() {
      confetti({ particleCount: 120, spread: 100, origin: { y: 0.6 }, colors: ['#ff4d6d', '#ffb3c6', '#ffe0f0', '#ff85a2', '#fbb1c2'] });
      setTimeout(() => {
        confetti({ particleCount: 80, spread: 80, origin: { y: 0.5, x: 0.3 }, colors: ['#f25f7a', '#ffc0cb', '#f9acb5'] });
        confetti({ particleCount: 80, spread: 80, origin: { y: 0.5, x: 0.7 }, colors: ['#ffb7c5', '#ff99aa', '#e6739a'] });
      }, 150);
      setTimeout(() => {
        confetti({ particleCount: 150, spread: 120, origin: { y: 0.5 }, colors: ['#ff4d6d', '#ffb3c6', '#ffe0f0', '#ff85a2'] });
        for (let i=0;i<3;i++) {
          setTimeout(() => confetti({ particleCount: 50, spread: 70, origin: { y: 0.5 } }), i*200);
        }
      }, 300);
    }

    function renderPuzzle() {
      if (!imageLoaded) {
        puzzleGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:#791e46;">Loading romantic image... 💕</div>';
        return;
      }
      
      puzzleGrid.innerHTML = '';
      for (let i = 0; i < TILE_COUNT; i++) {
        const tileValue = tiles[i];
        const row = Math.floor(tileValue / SIZE);
        const col = tileValue % SIZE;
        
        const tileDiv = document.createElement('div');
        tileDiv.className = 'puzzle-tile';
        if (selectedIndex === i) {
          tileDiv.classList.add('selected');
        }
        
        const bgPosX = (col * 100) + '%';
        const bgPosY = (row * 100) + '%';
        tileDiv.style.backgroundImage = `url('${currentImage}')`;
        tileDiv.style.backgroundSize = `300% 300%`;
        tileDiv.style.backgroundPosition = `${bgPosX} ${bgPosY}`;
        
        tileDiv.dataset.index = i;
        tileDiv.addEventListener('click', onTileClick);
        puzzleGrid.appendChild(tileDiv);
      }
      
      checkWin();
    }

    function onTileClick(e) {
      if (!imageLoaded) return;
      
      const index = parseInt(e.currentTarget.dataset.index);
      
      if (selectedIndex === null) {
        selectedIndex = index;
        renderPuzzle();
        return;
      }
      
      if (selectedIndex === index) {
        selectedIndex = null;
        renderPuzzle();
        return;
      }
      
      [tiles[selectedIndex], tiles[index]] = [tiles[index], tiles[selectedIndex]];
      selectedIndex = null;
      renderPuzzle();
    }

    function shuffleTiles() {
      if (!imageLoaded) return;
      
      for (let i = tiles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
      }
      if (isSolved()) {
        [tiles[0], tiles[1]] = [tiles[1], tiles[0]];
      }
      selectedIndex = null;
      gameWon = false;
      confettiFired = false;
      renderPuzzle();
      statusText.classList.remove('win-message');
      statusText.innerHTML = '💞 swap pieces · piece our love together 💞';
    }

    function initPuzzleSolved() {
      tiles = Array.from({ length: TILE_COUNT }, (_, i) => i);
      selectedIndex = null;
      gameWon = false;
      confettiFired = false;
      if (imageLoaded) {
        renderPuzzle();
      }
      statusText.innerHTML = '💞 swap pieces · piece our love together 💞';
    }

    // ----- PAGE SWITCHING -----
    function showQuotePage() {
      quotePage.classList.remove('hidden-page');
      puzzlePage.classList.add('hidden-page');
    }

    function showPuzzlePage() {
      quotePage.classList.add('hidden-page');
      puzzlePage.classList.remove('hidden-page');
      
      if (!imageLoaded) {
        // Show loading state
        puzzleGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:#791e46;">Loading romantic image... 💕</div>';
      }
      
      if (tiles.length === 0) {
        initPuzzleSolved();
      }
    }

    // ----- INITIALIZATION -----
    async function initialize() {
      // Show loading in puzzle grid initially
      puzzleGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:#791e46;">Loading romantic image... 💕</div>';
      
      try {
        await loadImage(PUZZLE_IMAGE);
        tiles = Array.from({ length: TILE_COUNT }, (_, i) => i);
        renderPuzzle();
        console.log('Image loaded successfully!');
      } catch (error) {
        console.error('Failed to load images:', error);
        // Create a fallback canvas image as last resort
        createFallbackImage();
        tiles = Array.from({ length: TILE_COUNT }, (_, i) => i);
        renderPuzzle();
      }
    }

    function createFallbackImage() {
      // Create a simple romantic canvas image as absolute fallback
      const canvas = document.createElement('canvas');
      canvas.width = 600;
      canvas.height = 600;
      const ctx = canvas.getContext('2d');
      
      const grad = ctx.createLinearGradient(0, 0, 600, 600);
      grad.addColorStop(0, '#ffb6c1');
      grad.addColorStop(1, '#ff69b4');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 600, 600);
      
      // Draw hearts
      ctx.fillStyle = '#ff1493';
      ctx.font = 'bold 80px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('❤️', 300, 200);
      ctx.fillText('💕', 200, 350);
      ctx.fillText('💗', 400, 350);
      
      ctx.font = 'bold 50px "Segoe UI", cursive';
      ctx.fillStyle = '#8b0045';
      ctx.fillText('I Love You', 300, 480);
      
      currentImage = canvas.toDataURL('image/png');
      imageLoaded = true;
    }

    // ----- EVENT LISTENERS -----
    startBtn.addEventListener('click', () => {
      if (tiles.length === 0) {
        initPuzzleSolved();
      }
      if (imageLoaded) {
        shuffleTiles();
      }
      showPuzzlePage();
    });

    backBtn.addEventListener('click', () => {
      showQuotePage();
    });

    shuffleBtn.addEventListener('click', () => {
      if (imageLoaded) {
        shuffleTiles();
      }
    });

    // Start initialization
    initialize();

    // Preload image when page loads
    window.addEventListener('load', () => {
      sourceImage.src = PUZZLE_IMAGE;
    });

  })();
</script>
</body>
</html>
